name: CI Build Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Backend Checks ──────────────────────────────────────────────────
  backend-check:
    name: Backend Lint & Setup Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/connected-actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: todo-backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd todo-backend
          npm ci

  # ── Frontend Checks ─────────────────────────────────────────────────
  frontend-check:
    name: Frontend Build & Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/connected-actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json

      - name: Install Dependencies
        run: |
          cd my-app
          npm ci

      - name: Verify Production Build
        run: |
          cd my-app
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:9000
